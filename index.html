<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Bienvenido a MasAire</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    const estiloBoton =
      "w-64 border border-gray-300 rounded-lg px-4 py-2 text-sm text-gray-700 hover:bg-green-100 hover:border-green-400 transition duration-200 shadow-sm";
  </script>

  <link rel="icon" href="assets/img/icon.png" type="image/png">
</head>

<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow p-4 flex justify-between items-center">
    <img src="assets/img/logomasaire.png" alt="MasAireLogo" class="h-14 object-contain">
    <div class="text-gray-600 flex items-center h-16">
      <a href="#" class="mx-2 hover:text-blue-500">Inicio</a>
      <a href="#" class="mx-2 hover:text-blue-500">Servicios</a>
      <a href="#" class="mx-2 hover:text-blue-500">Contacto</a>
    </div>
  </nav>

  <!-- Banner -->
  <section class="text-center py-20 bg-gradient-to-r from-blue-100 to-green-100">
    <h2 class="text-5xl font-bold text-blue-700 mb-4">
      Soluciones en aire acondicionado
    </h2>
    <p class="text-gray-600 mb-6">
      Instalación y reparación con tecnología moderna
    </p>
    <button onclick="abrirChat()" class="bg-blue-500 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-600">
      Solicitar servicio
    </button>
  </section>

  <!-- Servicios -->
  <section class="p-10 grid md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-xl shadow text-center">
      <img src="assets/img/air-conditioner.png" class="mx-auto mb-4" />
      <h3 class="text-lg font-bold text-blue-600">Instalación</h3>
      <p class="text-gray-500">Montaje profesional de equipos</p>
    </div>
    <div class="bg-white p-6 rounded-xl shadow text-center">
      <img src="assets/img/mechanic.png" class="mx-auto mb-4" />
      <h3 class="text-lg font-bold text-blue-600">Mantenimiento</h3>
      <p class="text-gray-500">Aumenta la vida útil de tu equipo</p>
    </div>
    <div class="bg-white p-6 rounded-xl shadow text-center">
      <img src="assets/img/maintenance.png" class="mx-auto mb-4" />
      <h3 class="text-lg font-bold text-blue-600">Reparación</h3>
      <p class="text-gray-500">Soluciones rápidas y eficientes</p>
    </div>
  </section>

  <!-- Botón flotante chat -->
  <button onclick="abrirChat()"
    class="fixed bottom-5 right-5 bg-green-400 hover:bg-green-500 text-white px-5 py-3 rounded-full shadow-lg">
    💬 Solicitar servicio
  </button>

  <!-- Chat -->
  <div id="chatBox" class="hidden fixed bottom-20 right-5 w-80 bg-white rounded-xl shadow-2xl flex flex-col">

    <!-- Encabezado chat -->
    <div class="bg-green-500 text-white p-3 rounded-t-xl font-bold">
      MasAire Manager Bot 💬
    </div>

    <!-- Mensajes -->
    <div id="chatMensajes" class="h-80 overflow-y-auto flex flex-col gap-2 p-3"></div>

    <!-- =====================================================
         MENÚS OCULTOS — fuente de botones para el chat
         ===================================================== -->

    <!-- Menú inicial -->
    <div id="menuInicial" class="hidden">
      <button onclick="seleccionarOpcion('Agendar')">Agendar</button>
      <button onclick="seleccionarOpcion('Consultar')">Consultar</button>
      <button onclick="seleccionarOpcion('Modificar')">Modificar</button>
      <button onclick="seleccionarOpcion('Cancelar')">Cancelar</button>
      <script>
        document.querySelectorAll('#menuInicial button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>
    </div>

    <!-- Menú tipo de servicio -->
    <div id="menuTipoServicio" class="hidden">
      <button onclick="seleccionarOpcion('Instalacion')">Instalacion</button>
      <button onclick="seleccionarOpcion('Reparacion')">Reparacion</button>
      <button onclick="seleccionarOpcion('Mantenimiento')">Mantenimiento</button>
      <script>
        document.querySelectorAll('#menuTipoServicio button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>
    </div>

    <!-- Menú tipo de aire -->
    <div id="menuTipoAire" class="hidden">
      <button onclick="seleccionarOpcion('Aire portatil')">Aire portatil</button>
      <button onclick="seleccionarOpcion('Aire de ventana')">Aire de ventana</button>
      <button onclick="seleccionarOpcion('Aire de techo')">Aire de techo</button>
      <script>
        document.querySelectorAll('#menuTipoAire button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>
    </div>

    <!-- Menú campos a modificar (PUT) -->
    <div id="menuCamposModificar" class="hidden">
      <button onclick="seleccionarOpcion('marca')">Marca</button>
      <button onclick="seleccionarOpcion('modelo')">Modelo</button>
      <button onclick="seleccionarOpcion('tipo')">Tipo</button>
      <button onclick="seleccionarOpcion('servicio')">Servicio</button>
      <script>
        document.querySelectorAll('#menuCamposModificar button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>
    </div>

    <!-- Menú confirmación eliminar (DELETE) -->
    <div id="menuConfirmar" class="hidden">
      <button onclick="seleccionarOpcion('Sí, eliminar')">Sí, eliminar</button>
      <button onclick="seleccionarOpcion('No, volver')">No, volver</button>
      <script>
        document.querySelectorAll('#menuConfirmar button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>
    </div>

    <!-- Input + botón enviar -->
    <div class="flex border-t">
      <input id="mensajeInput" class="w-full p-2 outline-none" placeholder="Escribe un mensaje..."
        onkeydown="if(event.key === 'Enter') enviarMensaje()" />
      <button onclick="enviarMensaje()" class="bg-green-500 text-white px-4">
        Enviar
      </button>
    </div>

  </div>

  <script src="js/app.js"></script>

</body>

</html>
