<!DOCTYPE html> <!--Habla con el navegador-->
<html lang="es"><!--Guarda toda la pag//
    lang="es" significa que esta en español-->


<head><!--Configuración que no se ve-->
  <meta charset="UTF-8"><!--Permite las letras con caracteres especiales ñ-->
  <link rel="stylesheet" type="text/css" href="css/styles.css "><!--Conecta con el css-->
  <title>Bienvenido a MasAire</title><!--el titulo de la pagina en la
  pestaña del navegador-->

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    const estiloBoton =
      "w-64 border border-gray-300 rounded-lg px-4 py-2 text-sm text-gray-700 hover:bg-green-100 hover:border-green-400 transition duration-200 shadow-sm";
  </script>

  <!--Incono pestaña-->
  <link rel="icon" href="assets/img/icon.png" type="image/png"> <!--link etuqieta que conecta html
  con algo externo, en este caso la carpeta donde tenemos la imagen del icono, pero puede ser con
  fuentes o css también. rel: indica con que se va a relacionar en este caso con un icono. 
  href: es la ruta donde se encuentra el archivo. En la ruta assets(carpeta)/img(subcarpeta)
  /icon.png(archivo). type: es el formato de la imagen o archiv. Por ultimo esta linea siempre
  debe ir ubicada en el <head> -->


</head><!--Configuración que no se ve-->


<body class="bg-gray-50">
  <!--Body es toda la parte (cuerpo) visible de la página. class: permite colocar los estilos.
    bg: background(fondo)-color(gray)-(tono o intensidad del tono)-->

  <!--Encabezado-->
  <nav class="bg-white shadow p-4 flex justify-between items-center"> <!--<nav(navbar) etiqueta html para menú de
  navegación. shandow: sombra abajo. p: padding: espacion interno, como espacio separado de los bordes
  flex(flexbox): organiza los elementos en linea horizontal. justify-between: es la justificación
  de los elementos en este caso uno a la der y otro a la izq, como frente al otro  -->

    <img src="assets/img/logomasaire.png" alt="MasAireLogo" class="h-14 object-contain"> <!--img: etiqueta para mostrar imagen. 
  src: la ruta de la imagen. alt: es un texto alternativo por si falla la imagen. h: es la altura de la img.
  object-contain: evita deformación de img-->

    <!--div Divide la página en secciones-->
    <div class="text-gray-600 flex items-center h-16"> <!--class=text: Color texto menú y alineación-->
      <!--Efecto al pasar el cursor por encima-->
      <a href="#" class="mx-2 hover:text-blue-500">Inicio</a> <!--<a>: esta etiqueta indica que es un enlace
        href_"" indica hacia donde va direccionado el enlace "#": es temporal porque indica quen no va a ningún lado
        nomalmente iría asi href="servicios.html". mx2: margen horizontal o espacio a los lados.
        hover: es el efecto al pasar el mouse-->
      <a href="#" class="mx-2 hover:text-blue-500">Servicios</a>
      <a href="#" class="mx-2 hover:text-blue-500">Contacto</a>
    </div>
  </nav>

  <!--Baner inicial-->
  <section class="text-center py-20 bg-gradient-to-r from-blue-100 to-green-100"> <!--section: etiqueta html que significa
    es una sección de la página. py:padding vertical(arriba y abajo). bg-gradient-to-r: degradado de iz a der-->
    <h2 class="text-5xl font-bold text-blue-700 mb-4"> <!--mb4: margen inferior-->
      <!--h1 es un título y van cambiando te tamaño h2, h3...-->
      Soluciones en aire acondicionado
    </h2>
    <p class="text-gray-600 mb-6">
      Instalación y reparación con tecnología moderna
    </p> <!--etiqueta para parrafo o texto normal-->

    <!--Boton azúl solicitar servicio-->
    <button onclick="abrirChat()" class="bg-blue-500 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-600">
      <!--rounded: bordes redondeados-->
      Solicitar servicio
    </button> <!--hasta aquí abre y cierra la etiqueta button(interactivo). oneclick: ejecuta la función en este caso
    "abrirChat() función que está en javascript"-->
  </section>


  <!--Servicios-->
  <section class="p-10 grid md:grid-cols-3 gap-6">

    <div class="bg-white p-6 rounded-xl shadow text-center">
      <img src="assets/img/air-conditioner.png" class="mx-auto mb-4" />
      <h3 class="text-lg font-bold text-blue-600">Instalación</h3>
      <p class="text-gray-500">Montaje profesional de equipos</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow text-center">
      <img src="assets/img/mechanic.png" class="mx-auto mb-4" />
      <h3 class="text-lg font-bold text-blue-600">Mantenimiento</h3>
      <p class="text-gray-500">Aumenta la vida útil de tu equipo</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow text-center">
      <img src="assets/img/maintenance.png" class="mx-auto mb-4" />
      <h3 class="text-lg font-bold text-blue-600">Reparación</h3>
      <p class="text-gray-500">Soluciones rápidas y eficientes</p>
    </div>

  </section>

  <!--Boton verde chat-->
  <button onclick="abrirChat()"
    class="fixed bottom-5 right-5 bg-green-400 hover:bg-green-500 text-white px-5 py-3 rounded-full shadow-lg">
    💬 Solcitar servicio
  </button>


  <!--Chat-->
  <div id="chatBox" class="hidden fixed bottom-20 right-5 w-80 bg-white rounded-xl shadow-2xl flex flex-col">
    <!--este id=chatBox es el que conecta con la función abrir chat de js abrirChat-->

    <!--Encabezado chat-->
    <div class="bg-green-500 text-white p-3 rounded-t-xl font-bold">
      MasAire Manager Bot 💬
    </div>

    <!-- MENSAJES -->
    <div id="chatMensajes" class="h-80 overflow-y-auto flex flex-col gap-2 p-3"></div>
    <!--id= le da nombre a la caja chatMensajes en este caso. overflow-y-auto: activa el scroll si hay muchos mjs
    Y ESTE ID ES EL QUE CONECTA EN JS PARA QUE RESPONDA EL BOT-->

    <!--BOTONES CHAT-->
    <!--Se crean los botones en un contenedor con id="botonesChat" para poder desaparecerlos en js cuando 
    se le da clic en el chat-->


    <!--Menú inicial-->
    <div id="menuInicial" class="hidden flex flex-col items-center mt-2 space-y-2">
      <button onclick="seleccionarOpcion('Agendar')" class="estiloBoton">
        Agendar
      </button>

      <button onclick="seleccionarOpcion('Consultar')" class="estiloBoton">
        Consultar
      </button>

      <button onclick="seleccionarOpcion('Modificar')" class="estiloBoton">
        Modificar
      </button>

      <button onclick="seleccionarOpcion('Cancelar')" class="estiloBoton">
        Cancelar
      </button>

      <script>
        // Aplicar el mismo estilo a los botones usando la variable
        document.querySelectorAll('#menuInicial button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>

    </div>

    <!--Menú tipo de servicio-->
    <div id="menuTipoServicio" class="hidden flex flex-col items-center mt-2 space-y-2">

      <button onclick="seleccionarOpcion('Instalacion')" class="estiloBoton">
        Instalacion
      </button>

      <button onclick="seleccionarOpcion('Reparacion')" class="estiloBoton">
        Reparacion
      </button>

      <button onclick="seleccionarOpcion('Mantenimiento')" class="estiloBoton">
        Mantenimiento
      </button>

      <script>
        // Aplicar el mismo estilo a los botones usando la variable
        document.querySelectorAll('#menuTipoServicio button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>

    </div>

    <!--Menú tipo de aire-->
    <div id="menuTipoAire" class="hidden flex flex-col items-center mt-2 space-y-2">

      <button onclick="seleccionarOpcion('Aire portatil')" class="estiloBoton">
        Aire portatil </button>

      <button onclick="seleccionarOpcion('Aire de ventana')" class="estiloBoton">
        Aire de ventana </button>

      <button onclick="seleccionarOpcion('Aire de techo')" class="estiloBoton">
        Aire de techo </button>

      <script>
        // Aplicar el mismo estilo a los botones usando la variable
        document.querySelectorAll('#menuTipoAire button').forEach(btn => {
          btn.className = estiloBoton;
        });
      </script>

    </div>

    <!-- Enviar botón -->
    <div class="flex border-t">
      <input id="mensajeInput" class="w-full p-2 outline-none" placeholder="Escribe un mensaje..." /> <!--input: campo donde el usuario escribe con su debida class
            id="mensajeInput" es el nombre que usa js para leer los mensajes. placeholder: es el mensaje que aparece cuando
            el input está vacío, en este caso "escribe un mensaje"-->
      <button onclick="enviarMensaje()" class="bg-green-500 text-white px-4">
        <!-- este es el botón enviar que tiene su funcion en js-->
        Enviar
      </button>
    </div>


  </div>

  <script src="js/app_copy.js"></script><!--Conecta con javascript-->

</body><!--Body es toda la parte (cuerpo) visible de la página-->


</html><!--Guarda toda la pag-->
